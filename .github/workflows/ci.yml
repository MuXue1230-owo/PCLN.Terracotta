name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet test PCLN.Terracotta.slnx -c Release --nologo --disable-build-servers -m:1

  helper-test:
    name: Helper tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --manifest-path src/Terracotta.Helper/Cargo.toml -- --check
      - run: cargo clippy --manifest-path src/Terracotta.Helper/Cargo.toml --locked --all-targets -- -D warnings
      - run: cargo test --manifest-path src/Terracotta.Helper/Cargo.toml --locked --all-targets

  helper-build:
    name: Helper ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc, rid: win-x64, executable: terracotta-helper.exe }
          - { os: windows-latest, target: aarch64-pc-windows-msvc, rid: win-arm64, executable: terracotta-helper.exe }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, rid: linux-x64, executable: terracotta-helper }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, rid: linux-arm64, executable: terracotta-helper }
          - { os: macos-latest, target: x86_64-apple-darwin, rid: osx-x64, executable: terracotta-helper }
          - { os: macos-latest, target: aarch64-apple-darwin, rid: osx-arm64, executable: terracotta-helper }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - run: cargo build --manifest-path src/Terracotta.Helper/Cargo.toml --locked --release --target ${{ matrix.target }}
      - name: Stage Helper
        shell: bash
        run: |
          mkdir -p "native/${{ matrix.rid }}"
          cp "src/Terracotta.Helper/target/${{ matrix.target }}/release/${{ matrix.executable }}" "native/${{ matrix.rid }}/${{ matrix.executable }}"
      - name: Stage optional EasyTier sidecar
        shell: bash
        env:
          EASYTIER_VERSION: ${{ vars.EASYTIER_VERSION }}
        run: |
          set -euo pipefail
          version="${EASYTIER_VERSION:-}"
          if [[ -z "$version" ]]; then
            echo "EASYTIER_VERSION repository variable is unset; packaging helper-only native assets."
            exit 0
          fi
          # Optional opt-in: set repo variable EASYTIER_VERSION (e.g. 2.6.4) to download official EasyTier assets.
          rid="${{ matrix.rid }}"
          case "$rid" in
            win-x64) asset="easytier-windows-x86_64.zip"; bin="easytier-core.exe" ;;
            win-arm64) asset="easytier-windows-arm64.zip"; bin="easytier-core.exe" ;;
            linux-x64) asset="easytier-linux-x86_64.zip"; bin="easytier-core" ;;
            linux-arm64) asset="easytier-linux-aarch64.zip"; bin="easytier-core" ;;
            osx-x64) asset="easytier-macos-x86_64.zip"; bin="easytier-core" ;;
            osx-arm64) asset="easytier-macos-aarch64.zip"; bin="easytier-core" ;;
            *) echo "Unknown RID $rid"; exit 1 ;;
          esac
          url="https://github.com/EasyTier/EasyTier/releases/download/v${version}/${asset}"
          tmp="$(mktemp -d)"
          if ! curl -fsSL "$url" -o "$tmp/$asset"; then
            echo "Failed to download $url; continuing without EasyTier sidecar."
            exit 0
          fi
          unzip -qo "$tmp/$asset" -d "$tmp/out"
          found="$(find "$tmp/out" -type f -name "$bin" | head -n 1 || true)"
          if [[ -z "$found" ]]; then
            echo "EasyTier archive did not contain $bin; continuing without sidecar."
            exit 0
          fi
          cp "$found" "native/${rid}/$bin"
          chmod +x "native/${rid}/$bin" || true
          echo "Staged EasyTier sidecar $bin for $rid"
          cli_name="easytier-cli"
          if [[ "$rid" == win-* ]]; then cli_name="easytier-cli.exe"; fi
          cli_found="$(find "$tmp/out" -type f -name "$cli_name" | head -n 1 || true)"
          if [[ -n "$cli_found" ]]; then
            cp "$cli_found" "native/${rid}/$cli_name"
            chmod +x "native/${rid}/$cli_name" || true
            echo "Staged EasyTier CLI $cli_name for $rid"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: helper-${{ matrix.rid }}
          path: native/${{ matrix.rid }}
          if-no-files-found: error

  package:
    name: Build signed-development PNP
    runs-on: ubuntu-latest
    needs: [dotnet, helper-test, helper-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v4
        with:
          pattern: helper-*
          path: native
      - name: Normalize Helper artifact directories
        shell: bash
        run: |
          for directory in native/helper-*; do
            rid="${directory#native/helper-}"
            mv "$directory" "native/$rid"
          done
      - run: dotnet build src/PCLN.Terracotta.Plugin/PCLN.Terracotta.Plugin.csproj -c Release --nologo -p:TerracottaRequireNativeHelpers=true
      - uses: actions/upload-artifact@v4
        with:
          name: terracotta-pnp
          path: artifacts/*.pnp
          if-no-files-found: error
